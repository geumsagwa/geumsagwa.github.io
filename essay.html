<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob: https:; font-src 'self' data: https: https://fonts.gstatic.com; frame-src 'self' blob: data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
    <title>에세이 - 생각을 잇다</title>
        <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light-mode')</script>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style-pages.css">
<link rel="stylesheet" href="style-light.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<nav class="menu-bar">
    <a href="index.html" class="menu-logo">
        <span class="menu-logo-text">생각을 잇다</span>
    </a>
    <ul class="menu-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="library.html">Library</a></li>
        <li class="active"><a href="blog.html">Blog</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="board.html">Board</a></li>
        <li class="diary-menu" style="display:none"><a href="diary.html">Diary</a></li>
        <li class="admin-menu" style="display:none"><a href="admin.html">관리</a></li>
    </ul>
    <div class="auth-area" id="auth-area"></div>
</nav>

<div class="review-container">

    <div class="review-header">
        <a href="blog.html" class="review-back">← Blog</a>
        <span class="review-category">Essay</span>
    </div>

    <article class="review-article" id="essay-article" style="display:none;">

        <div class="review-book-info" style="border-left: 3px solid #8f7d60; padding-left: 1.5rem; margin-bottom: 2rem;">
            <h1 class="review-book-title" id="essay-title"></h1>
            <time class="review-date" id="essay-date"></time>
        </div>

        <div class="review-body" id="essay-body"></div>

        <div style="margin-top:3rem; text-align:right;">
            <a id="edit-link" href="#" class="blog-write-btn" style="display:none;">수정</a>
        </div>

    </article>

    <div id="essay-loading" style="text-align:center; padding:10vh 0;">
        <p style="color:#555; font-family:'GyeonggiBatang',sans-serif; font-size:0.9rem;">불러오는 중...</p>
    </div>

    <div id="essay-error" style="display:none; text-align:center; padding:10vh 0;">
        <p style="color:#555; font-family:'GyeonggiBatang',sans-serif; font-size:1rem;">에세이를 찾을 수 없습니다.</p>
        <a href="blog.html" style="color:#8f7d60; font-family:'GyeonggiBatang',sans-serif; font-size:0.85rem; text-decoration:none;">← 목록으로 돌아가기</a>
    </div>

</div>

<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="blog-detail-common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    await loadMarkdownPostDetail({
        table: 'essays',
        titleId: 'essay-title',
        dateId: 'essay-date',
        bodyId: 'essay-body',
        loadingId: 'essay-loading',
        articleId: 'essay-article',
        errorId: 'essay-error',
        editorPage: 'essay-editor.html'
    });
});
</script>

</body>
</html>
