name: CodeShield Homepage Check

on:
  push:
    branches:
      - master
      - main
      - "chore/**"
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  homepage-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run CodeShield checks
        run: npm run check
