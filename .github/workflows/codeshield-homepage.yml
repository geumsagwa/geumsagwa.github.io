name: CodeShield Homepage Check

on:
  push:
    branches:
      - master
      - main
      - "chore/**"
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  homepage-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

name: CodeShield Homepage Check

on:
  push:
    branches:
      - master
      - main
      - "chore/**"
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  homepage-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run CodeShield checks (if package.json exists)
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm install
            npm run check
          elif [ -f project/homepage/package.json ]; then
            cd project/homepage
            npm install
            npm run check
          else
            echo "No package.json found. Skipping check for this revision."
          fi
